<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Calendar Popout</title>
    <link rel="stylesheet" href="style.css" />
    <script defer src="script.js"></script>
  </head>
  <body>
    <button class="btn show-btn">View Calendar</button>

    <div class="popout-bg">
      <div class="popout calendar">
        <div class="calendar-header">
          <h2 class="month-name"></h2>
          <span class="btn prev-btn">&lt;</span>
          <span class="btn next-btn">&gt;</span>
          <div class="cal-grid-date cal-grid-day">Sun</div>
          <div class="cal-grid-date cal-grid-day">Mon</div>
          <div class="cal-grid-date cal-grid-day">Tue</div>
          <div class="cal-grid-date cal-grid-day">Wed</div>
          <div class="cal-grid-date cal-grid-day">Thr</div>
          <div class="cal-grid-date cal-grid-day">Fri</div>
          <div class="cal-grid-date cal-grid-day">Sat</div>
        </div>
        <div class="calendar-grid"></div>
        <button class="btn hide-btn">Close</button>
      </div>
    </div>
  </body>
</html>
